<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">


<head>
    <title>Deckforge</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
    <meta name="description" content="Deckforge Hjemmeside">
    <meta name="keywords" content="Magic, Magic the Gathering, Magic: The Gathering, MTG, MtG, mtg, Deckforge">
    <meta name="author" content="???">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header
        th:replace="~{fragments/header :: header}">
</header>


<nav
        th:insert="~{fragments/post-navbar :: post-navbar}">
</nav>


<main class="standard-main">

    <article class="standard-main-article">



        <h2>Her kan du navigere rundt til forskellige event sider</h2>
        <br>
        <p>Her kan du se opkommende events:</p>
        <br>
        <form th:action="@{/event/future-events}" method="get">
            <button type="submit" class="standard-button" >Se kommende events</button>
        </form>
        <br>
        <br>
        <p>Her kan du se de events du er tilmeldt:</p>
        <br>
        <form th:action="@{/event/registered-events}" method="get">
            <button type="submit" class="standard-button" >Se tilmeldte events</button>
        </form>

        <section th:if="${role.name() == 'ORGANIZER' or role.name() == 'ADMIN'}">
            <br>
            <br>
            <p>Her kan du oprette nye events:</p>
            <br>
            <form th:action="@{/event/add-event}" method="get">
                <button type="submit" class="standard-button" >Opret nyt event</button>
            </form>
        </section>


    </article>

</main>


<footer class="standard-footer"
        th:insert="~{fragments/footer :: footer}">
</footer>


</body>


</html>

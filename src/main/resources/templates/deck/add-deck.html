<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">


<head>
    <title>Deckforge</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
    <meta name="description" content="Deckforge Hjemmeside">
    <meta name="keywords" content="Magic, Magic the Gathering, Magic: The Gathering, MTG, MtG, mtg, Deckforge">
    <meta name="author" content="???">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="standard-header"
        th:replace="~{fragments/header :: header}">
    </header>




    <nav
        th:insert="~{fragments/post-navbar :: post-navbar}">
    </nav>



    <main class="standard-main">

        <article class="standard-main-article">

            <a th:href="@{/deck/personal-decks}" class="back-button">Tilbage</a>

            <h2>Opret Nyt Deck</h2>
            <p>Indtast den relevante information, og klik på knappen:</p>
            <br>
        <!--Viser kun fejlmeddelse/border hvis den ikke er tom eller null -->
        <section class="standard-warning-message" th:if="${responseMessage != null and !#strings.isEmpty(responseMessage)}">
            <p th:text="${responseMessage}"></p>
        </section>
        <br>

            <form th:action="@{/deck/add-deck}" method="post" th:object="${deck}">
                <label for="deck-name">Indtast Navn på deck </label><br>
                <input type="text" id="deck-name" th:field="*{deckName}"  required><br><br>
                <label for="format">Vælg format på deck </label>
                <br>
                <select class="drop-down" th:field="*{format}" name="format" id="format">
                    <option th:each="formatOption : ${format}"
                        th:value="${formatOption}"
                        th:text="${formatOption.displayValue}"
                    ></option>
                </select>
                <br>
                <button type="submit" class="standard-button" >Opret Deck</button>
            </form>

        </article>
    </main>



    <footer class="standard-footer"
        th:insert="~{fragments/footer :: footer}">
    </footer>


</body>

</html>

<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">


<head>
    <title>Deckforge</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
    <meta name="description" content="Deckforge Hjemmeside">
    <meta name="keywords" content="Magic, Magic the Gathering, Magic: The Gathering, MTG, MtG, mtg, Deckforge">
    <meta name="author" content="???">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header
        th:replace="~{fragments/header :: header}">
</header>


<nav
        th:insert="~{fragments/post-navbar :: post-navbar}">
</nav>


<main class="card-details-main">
    <section class="card-details-container">

        <a th:href="@{/deck/deck-details/{deckId}(deckId=${deck.deckId})}" class="back-button">Tilbage</a>

        <article class="card-details-image">
            <img th:src="@{'/images/' + ${deckCard.picture}}" alt="Card image">
        </article>


        <section class="card-details-info">
            <h2 th:text="${deckCard.name}"></h2>
            <h3 th:if="${deckCard.isCommander == true}">
                <strong>Commander kort</strong></h3>
            <p><strong>Mana cost:</strong></p>
            <ul class="mana-list">
                <li th:if="${deckCard.neutralMana > 0}">
                    ⚪ <span th:text="${deckCard.neutralMana}"></span>
                </li>
                <li th:if="${deckCard.blackMana > 0}">
                    💀 <span th:text="${deckCard.blackMana}"></span>
                </li>
                <li th:if="${deckCard.blueMana > 0}">
                    💧 <span th:text="${deckCard.blueMana}"></span>
                </li>
                <li th:if="${deckCard.greenMana > 0}">
                    🍃 <span th:text="${deckCard.greenMana}"></span>
                </li>
                <li th:if="${deckCard.redMana > 0}">
                    🔥 <span th:text="${deckCard.redMana}"></span>
                </li>
                <li th:if="${deckCard.whiteMana > 0}">
                    🌞 <span th:text="${deckCard.whiteMana}"></span>
                </li>
            </ul>


            <p th:if="${deckCard.superType != null}">
                <strong>Supertype:</strong> <span th:text="${deckCard.superType.displayValue}"></span></p>
            <p><strong>Type:</strong> <span th:text="${deckCard.type.displayValue}"></span></p>
            <p th:if="${deckCard.multiType != null}">
                <strong>Multitype:</strong> <span th:text="${deckCard.multiType.displayValue}"></span></p>
            <p th:if="${deckCard.subType != null and !#strings.isEmpty(deckCard.subType)}">
                <strong>Subtype:</strong> <span th:text="${deckCard.subType}"></span></p>
            <p><strong>Set:</strong> <span th:text="${deckCard.setName}"></span></p>
            <p><strong>Rarity:</strong> <span th:text="${deckCard.rarity.displayValue}"></span></p>
            <p th:if="${deckCard.ruleText != null and !#strings.isEmpty(deckCard.ruleText)}">
                <strong>Rule text:</strong> <span th:text="${deckCard.ruleText}"></span></p>
            <p th:if="${deckCard.canBeCommander == true}">
                <strong>Kan være commander: </strong><span>Ja</span></p>
            <p th:if="${deckCard.power > 0 or deckCard.toughness > 0}">
                <strong>Power/Toughness:</strong> <span th:text="${deckCard.power}"></span>/<span th:text="${deckCard.toughness}"></span></p>



            <form th:action="@{/deck/remove-card-detail/{deckId}/{deckContainId}(deckId=${deck.deckId}, deckContainId=${deckCard.deckContainId})}" method="post">
                <button type="submit" class="standard-button">Fjern kort</button>
            </form>

        </section>
    </section>
</main>



<footer class="standard-footer"
        th:insert="~{fragments/footer :: footer}">
</footer>


</body>


</html>
